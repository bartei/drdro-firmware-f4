; PlatformIO Project Configuration File — drDRO firmware
; Migrated from STM32CubeIDE project `rotary-controller-f4` (branch: main, v2.0.1).
; See migration_todo.md (detail) and migration_checklist.md (progress).

[env:drdro_f411ce]
platform  = ststm32@~19.4.0          ; pinned for reproducible HAL/CMSIS/toolchain
board     = genericSTM32F411CE        ; STM32F411CEU6 — 512K flash / 128K RAM, f_cpu 100 MHz
framework = stm32cube

; Custom linker script keeps the exact memory/heap/stack map from the Cube project.
board_build.ldscript = STM32F411CEUX_FLASH.ld

; Cortex-M4F hard-float on compile AND link (the board/framework default is soft);
; inject FW_VERSION from git for the protocol `version` command.
extra_scripts =
    pre:support/stm32_hardfloat.py
    pre:support/fw_version.py

; Match the shipping Release build (CMake -Ofast). The synchro-motion ISR is timing-sensitive.
build_unflags = -Os
build_flags =
    -Ofast
    -I include
    -D USE_HAL_DRIVER
    -D STM32F411xE
    -D ARM_MATH_CM4
    -D ARM_MATH_MATRIX_CHECK
    -D ARM_MATH_ROUNDING
    -Wl,-u,_printf_float          ; %g for float vars (servo.max/acc/jog) under nano.specs

; Library Dependency Finder: resolve headers in lib/FreeRTOS and lib/Modbus.
lib_ldf_mode = chain+

; Flash / debug via ST-Link (custom board, same as the Cube workflow).
upload_protocol = stlink
debug_tool      = stlink
monitor_speed   = 115200
