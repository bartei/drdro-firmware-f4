; drDRO IAP bootloader — standalone PlatformIO project.
; Sector 0 (16 KB) @ 0x08000000. The application is the sibling `app/` project
; (relocated to 0x08004000). Shared app<->bootloader contract: ../shared/Bootloader.h.
;
;   Build:  pio run            (from this bootloader/ dir, or `pio run -d bootloader`)
;   Flash:  pio run -t upload  (ST-Link; then flash the app project at 0x08004000)
;
; Standalone (not a second env of the app) so the source tree stays unambiguous: this
; dir IS the bootloader, src/ at the root IS the app. No -Ofast/FreeRTOS/hard-float here
; (no motion ISR, no RTOS) — size-optimized to fit the reserved sectors. The HSE_VALUE
; fix is still required (framework defaults to 25 MHz; board crystal is 8 MHz).

[env:bootloader]
platform  = ststm32@~19.4.0
board     = genericSTM32F411CE
framework = stm32cube
board_build.ldscript = STM32F411CEUX_FLASH_BOOT.ld

build_flags =
    -Os
    -I ../shared                  ; app<->bootloader contract (Bootloader.h)
    -D USE_HAL_DRIVER
    -D STM32F411xE
    -D HSE_VALUE=8000000          ; board crystal is 8 MHz (see app platformio.ini / RESUME.md)

extra_scripts =
    post:support/make_hex.py      ; emit firmware.hex (for the combined factory image + releases)

lib_ldf_mode  = chain+
upload_protocol = stlink
debug_tool      = stlink
monitor_speed   = 115200
