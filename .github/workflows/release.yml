name: Release

# Semantic release (same tooling as drdro-arch / drdro-software-f4: python-semantic-release).
# push to dev  -> next version as a BETA prerelease (vX.Y.Z-beta.N, GitHub prerelease)
# push to main -> OFFICIAL stable release (vX.Y.Z)
# The firmware is built INSIDE `semantic-release version` (build_command in pyproject.toml) so
# the binaries embed the exact released version (FW_VERSION -> app/support/fw_version.py).
# Release notes fold beta changes into the stable release (templates/.release_notes.md.j2).

on:
  push:
    branches: [main, dev]

permissions:
  contents: write              # push the changelog commit, create tags and releases

concurrency: release

jobs:
  release:
    name: semantic-release (version + firmware + changelog)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Don't run on the changelog commit semantic-release pushes back.
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # semantic-release needs full history + tags

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('app/platformio.ini', 'bootloader/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO + semantic-release
        run: |
          pip install --upgrade platformio
          pipx install python-semantic-release

      - name: Semantic release (version -> build firmware -> tag -> publish + assets)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semantic-release version
          semantic-release publish

      - name: Changelog report (job summary)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ls dist/drdro-app.bin >/dev/null 2>&1; then
            TAG="$(git describe --tags --abbrev=0)"
            {
              echo "## Released ${TAG} (${GITHUB_REF_NAME})"
              echo
              gh release view "$TAG" --json body -q .body
              echo
              echo '### Assets'
              echo '```'
              ls -lh dist/
              cat dist/SHA256SUMS.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No release for this push (no version bump)." >> "$GITHUB_STEP_SUMMARY"
          fi
