name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read              # least-privilege GITHUB_TOKEN (CodeQL: actions/missing-workflow-permissions)

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history + tags so FW_VERSION (git describe) resolves

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        run: pio run -e drdro_f411ce

      - name: Run native unit tests
        run: pio test -e native

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .pio/build/drdro_f411ce/firmware.elf
            .pio/build/drdro_f411ce/firmware.bin
            .pio/build/drdro_f411ce/firmware.hex
          if-no-files-found: error
