; PlatformIO Project Configuration File — drDRO firmware
; Migrated from STM32CubeIDE project `rotary-controller-f4` (branch: main, v2.0.1).
; See migration_todo.md (detail) and migration_checklist.md (progress).

[platformio]
default_envs = drdro_f411ce          ; `pio run` builds only the firmware; tests use `-e native`

[env:drdro_f411ce]
platform  = ststm32@~19.4.0          ; pinned for reproducible HAL/CMSIS/toolchain
board     = genericSTM32F411CE        ; STM32F411CEU6 — 512K flash / 128K RAM, f_cpu 100 MHz
framework = stm32cube

; Custom linker script: app relocated to sector 1 (0x08004000) for the IAP bootloader
; (sector 0 is the bootloader). STM32F411CEUX_FLASH.ld keeps the original 0x08000000
; map as reference / for a no-bootloader build.
board_build.ldscript = STM32F411CEUX_FLASH_APP.ld

; Cortex-M4F hard-float on compile AND link (the board/framework default is soft);
; inject FW_VERSION from git for the protocol `version` command.
extra_scripts =
    pre:support/stm32_hardfloat.py
    pre:support/fw_version.py
    post:support/make_hex.py

; Match the shipping Release build (CMake -Ofast). The synchro-motion ISR is timing-sensitive.
build_unflags = -Os
build_flags =
    -Ofast
    -I include
    -I ../shared                  ; app<->bootloader contract (Bootloader.h)
    -D USE_HAL_DRIVER
    -D STM32F411xE
    -D HSE_VALUE=8000000          ; board crystal is 8 MHz; framework default 25 MHz → wrong USART1 baud
    -D ARM_MATH_CM4
    -D ARM_MATH_MATRIX_CHECK
    -D ARM_MATH_ROUNDING
    -Wl,-u,_printf_float          ; %g for float vars (servo.max/acc/jog) under nano.specs
    ; App loads at 0x08004000 (sector 1), not 64 KB-aligned. ld's default max-page-size
    ; (0x10000) would round the first LOAD segment down to 0x08000000 and bake the ELF
    ; header into it, so flashing the .elf clobbers the bootloader. 0x4000 makes 0x08004000
    ; an aligned segment boundary → clean segment, .elf flashes to the right address.
    -Wl,-z,max-page-size=0x4000

; Library Dependency Finder: resolve headers in lib/FreeRTOS.
lib_ldf_mode = chain+

; Flash / debug via ST-Link (custom board, same as the Cube workflow).
upload_protocol = stlink
debug_tool      = stlink
monitor_speed   = 115200

; The IAP bootloader is a SEPARATE project under bootloader/ (its own platformio.ini),
; not an env here — keeps this source tree unambiguously the application. See bootloader_todo.md.

[env:native]
; Host-side unit tests for the transport-independent protocol logic (parser,
; dispatch, registry, checksum). HAL/CMSIS-RTOS are mocked under test/mocks/.
; Run: pio test -e native
platform        = native
test_framework  = unity
test_build_src  = yes                 ; link project src into the tests...
build_src_filter = -<*> +<Protocol.c> ; ...but only Protocol.c (the rest is HW-bound)
build_flags =
    -I include
    -I ../shared
    -I test/mocks
    -std=gnu11
    -Wall
